<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex, nofollow" />
<title>Slides · tstephen.com</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=STIX+Two+Text:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Source+Sans+3:ital,wght@0,400;0,500;0,600;0,700;1,400&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="shared/tokens.css" />
<style>
  /* Unlisted hub — the author's working view. Audiences get direct deck links. */
  body { margin: 0; background: #f6f7f8; color: var(--tcd-ink); font-family: var(--sans); }
  .wrap { max-width: 920px; margin: 0 auto; padding: 72px 28px 96px; }
  header .kick { font-size: 13px; font-weight: 600; letter-spacing: 0.16em; text-transform: uppercase; color: var(--tcd-blue); }
  header h1 { font-family: var(--serif); font-size: 44px; font-weight: 600; margin: 10px 0 6px; }
  header p { color: var(--tcd-grey-100); margin: 0; max-width: 620px; line-height: 1.5; }
  .year { margin-top: 52px; }
  .year > .y { font-family: var(--serif); font-size: 26px; font-weight: 600; color: var(--tcd-grey-75); border-bottom: 1px solid var(--tcd-grey-25); padding-bottom: 8px; }
  a.deck { display: flex; align-items: baseline; gap: 16px; padding: 18px 4px; border-bottom: 1px solid var(--tcd-grey-25); text-decoration: none; color: inherit; }
  a.deck:hover { background: #fff; }
  .deck .t { font-family: var(--serif); font-size: 22px; font-weight: 500; color: var(--tcd-ink); flex: 1 1 auto; min-width: 0; }
  .deck .v { font-size: 15px; color: var(--tcd-grey-100); white-space: nowrap; }
  .deck .d { font-family: var(--mono); font-size: 13px; color: var(--tcd-grey-75); white-space: nowrap; }
  .chip { font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; padding: 3px 9px; border-radius: 99px; white-space: nowrap; }
  .chip.ready { background: color-mix(in srgb, var(--tcd-blue) 12%, white); color: var(--tcd-blue); }
  .chip.draft { background: var(--tcd-grey-25); color: var(--tcd-grey-100); }
  .empty { padding: 40px 4px; color: var(--tcd-grey-75); font-style: italic; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="kick">slides.tstephen.com</div>
    <h1>Slides</h1>
    <p>Research talk decks — Thomas Stephen. This page is an unlisted working index;
       each deck lives at a stable URL <code>/&lt;year&gt;/&lt;slug&gt;/</code>.</p>
  </header>
  <main id="list"></main>
</div>

<script src="shared/decks.js"></script>
<script>
(function () {
  var decks = (window.DECKS || []).slice().sort(function (a, b) {
    return b.year - a.year || (b.date < a.date ? -1 : b.date > a.date ? 1 : 0);
  });
  var byYear = {};
  decks.forEach(function (d) { (byYear[d.year] = byYear[d.year] || []).push(d); });
  var years = Object.keys(byYear).sort(function (a, b) { return b - a; });
  var out = years.map(function (y) {
    var rows = byYear[y].map(function (d) {
      return '<a class="deck" href="' + d.year + "/" + d.slug + '/">' +
        '<span class="t">' + d.title + "</span>" +
        '<span class="v">' + (d.venue || "") + "</span>" +
        '<span class="d">' + (d.date || "") + "</span>" +
        '<span class="chip ' + d.status + '">' + d.status + "</span></a>";
    }).join("");
    return '<section class="year"><div class="y">' + y + "</div>" + rows + "</section>";
  }).join("");
  document.getElementById("list").innerHTML = out || '<div class="empty">No decks yet.</div>';
})();
</script>
</body>
</html>
