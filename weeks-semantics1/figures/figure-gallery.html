<script type="text/babel">
const { DesignCanvas, DCSection, DCArtboard, DCPostIt } = window;
const W = 1060;

function Fig({ src }) {
  return <iframe className="fig-iframe" src={src} title={src}></iframe>;
}

function App() {
  return (
    <DesignCanvas>
      <DCSection id="intro" title="Lattices, atoms & events" subtitle="Mereological figures for Semantics I · Describing Meaning — Link · Bach · Krifka">
        <DCArtboard id="readme" label="Read me" width={760} height={520}>
          <div className="intro" style={{height:'100%',background:'#fff',borderRadius:6,padding:'52px 56px',boxSizing:'border-box',color:'#11151a'}}>
            <h1 style={{fontSize:40,margin:'0 0 14px',lineHeight:1.05}}>The algebra of objects &amp; events</h1>
            <p style={{fontSize:21,lineHeight:1.45,color:'#50555a',margin:'0 0 22px'}}>
              Eight self-contained, animated figures on the part–whole structure shared by <b>matter, pluralities, and events</b> —
              the through-line from Link’s lattices to Krifka’s incremental themes.
            </p>
            <ul style={{fontSize:19,lineHeight:1.7,color:'#11151a',paddingLeft:22,margin:0}}>
              <li><b>Open any figure full-screen</b> with the ⤢ button on its frame (←/→ to step, Esc to exit).</li>
              <li>Each is a single HTML file in <code style={{fontFamily:'var(--mono)',fontSize:16}}>weeks-semantics1/figures/</code> — drop into a slide via <code style={{fontFamily:'var(--mono)',fontSize:16}}>&lt;iframe&gt;</code>.</li>
              <li>Styled to match the deck system (STIX serif · TCD blue · lens colours).</li>
            </ul>
          </div>
        </DCArtboard>
      </DCSection>

      <DCSection id="w4" title="Week 4 · Stuff and Things" subtitle="Mass, count & plurals — the join semilattice and the reference properties">
        <DCArtboard id="semilattice" label="1 · Join semilattice of plurals  ·  the ∗ operator" width={W} height={820}>
          <Fig src="fig-semilattice.html" />
        </DCArtboard>
        <DCArtboard id="mass-count" label="2 · Mass vs count  ·  atomicity & divisive reference" width={W} height={820}>
          <Fig src="fig-mass-count.html" />
        </DCArtboard>
        <DCArtboard id="quantized" label="3 · Cumulative vs quantized reference  ·  Krifka" width={W} height={820}>
          <Fig src="fig-quantized.html" />
        </DCArtboard>
      </DCSection>

      <DCSection id="w8" title="Week 8 · Verbs and Events" subtitle="Bach’s parallel and the structure that links objects, events and time">
        <DCArtboard id="bach" label="4 · Bach’s parallel  ·  objects ↔ events" width={W} height={880}>
          <Fig src="fig-bach-parallel.html" />
        </DCArtboard>
        <DCArtboard id="time-space" label="7 · Space · event · time  ·  μ and τ homomorphisms" width={W} height={880}>
          <Fig src="fig-time-space.html" />
        </DCArtboard>
      </DCSection>

      <DCSection id="w10" title="Week 10 · Aktionsart and Time" subtitle="Incremental themes, telicity, and the Vendler feature space">
        <DCArtboard id="incremental" label="5 · Incremental theme  ·  object→event homomorphism" width={W} height={820}>
          <Fig src="fig-incremental.html" />
        </DCArtboard>
        <DCArtboard id="telicity" label="6 · Telicity  ·  where the finish line comes from" width={W} height={820}>
          <Fig src="fig-telicity.html" />
        </DCArtboard>
        <DCArtboard id="aktionsart" label="8 · Aktionsart  ·  the Vendler classes" width={W} height={880}>
          <Fig src="fig-aktionsart.html" />

}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
