<section class="slide" data-label="Density vs speed"
  data-speaker-notes="Frame as evidence for an efficiency / least-effort pressure on language form (Zipf): speakers economise, and the trade-off is the system-level signature of that pressure. This is the bridge into Grice — the Quantity and Manner maxims as the conversational face of the same economy. Keep the information-theoretic machinery out of it here; we only need the intuition that each syllable carries a measurable amount of information. Be honest on two points: (1) ~39 bits/s is a MEAN across 17 languages, not a constant — note the scatter and SD ~5; (2) this measures phonological encoding only (within-word syllable entropy), not everything a language conveys. Reading of the plot: top-left = low density, fast (Basque, Japanese); bottom-right = high density, slow (Thai, Vietnamese); yet all hug the 40 bits/s line. Across-language density-rate correlation r = -0.69.">
  <div class="b-slide pal-a lens-empirical drc-slide">
    <div class="b-rail"></div><!-- filled by prag-rail.js -->
    <div class="b-main">
      <div class="lens-kick"><span class="ik"><svg viewBox="0 0 24 24"><use href="#g-emp"/></svg></span>Empirical<span class="ct">LI7862 · Week 6 · Information</span></div>
      <h2 class="b-h">Languages trade density against speed</h2>
      <p class="drc-take">Pack more into each syllable, and you say fewer per second — so different languages end up conveying information at a similar rate.</p>
      <div class="drc-wrap"><div data-drc='{}'></div></div>
      <div class="drc-src"><b>Coupé et al. (2019)</b>, Science Advances.</div>
    </div>
  </div>
</section>
