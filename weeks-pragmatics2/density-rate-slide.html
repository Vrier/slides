<section class="slide" data-label="Information-rate attractor"
  data-speaker-notes="The hook from Shannon: a channel has a capacity, and an efficient code pushes the average rate of information up against it. Read the plot as exactly that — 17 languages, wildly different phonologies, all settling near ~39 bits/s. Connect to Uniform Information Density (Levy & Jaeger 2007; Aylett & Turk 2004): within an utterance, speakers smooth surprisal toward a roughly constant rate (lengthening / reducing, choosing optional words) so as not to over- or under-shoot the channel. The slide's claim is that the SAME efficiency logic shows up at two scales. STRESS THE DISTINCTION: this attractor is a BETWEEN-language regularity (each dot is a whole language); UID is a WITHIN-utterance regularity (moment-to-moment). They are analogous, not identical. Tie to rational / efficiency-based pragmatics (RSA): speakers as approximately optimal encoders. CAVEAT: 'density' here is a within-word syllable-bigram entropy — it deliberately excludes morphosyntactic and discourse information, so '40 bits/s' is the phonological encoding rate, not total communicative throughput. Spreads: density ±15%, rate ±15%, but information rate only ±8% — the trade-off cancels most of the variance.">
  <div class="b-slide pal-a drc-slide">
    <div class="b-rail"></div><!-- filled by prag2-rail.js -->
    <div class="b-main">
      <div class="b-kick">Approach · Information &middot; Week 6</div>
      <h2 class="b-h">An information-rate attractor (~39 bits/s)</h2>
      <p class="drc-take">The cross-linguistic attractor mirrors within-language Uniform Information Density — speakers and languages both smooth toward channel capacity.</p>
      <div class="drc-wrap"><div data-drc='{"callout":true,"statStrip":true}'></div></div>
      <div class="drc-src"><b>Coupé et al. (2019)</b>, Science Advances.</div>
    </div>
  </div>
</section>
